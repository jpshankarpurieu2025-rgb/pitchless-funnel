<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pitchless — Application Funnel</title>
<style>
  :root {
    --bg: #0c0d10; --card: #16181d; --border: #24272e;
    --text: #f2f3f5; --muted: #8b909a; --accent: #4ade80;
    --bar: linear-gradient(90deg, #4ade80, #22c55e);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Inter, sans-serif;
    padding: 40px 20px; max-width: 960px; margin: 0 auto;
  }
  header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  #updated { color: var(--muted); font-size: 13px; }
  .meta { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .sheet-link { color: var(--accent); font-size: 13px; font-weight: 600; text-decoration: none; }
  .sheet-link:hover { text-decoration: underline; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stat .n { font-size: 30px; font-weight: 700; }
  .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 24px; }
  h2 { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: 150px 1fr 90px; align-items: center; gap: 14px; margin-bottom: 14px; }
  .row .label { font-weight: 600; font-size: 14px; }
  .track { background: #1e2127; border-radius: 6px; height: 30px; overflow: hidden; }
  .fill { height: 100%; background: var(--bar); border-radius: 6px; min-width: 2px; transition: width 0.8s cubic-bezier(.2,.8,.2,1); }
  .pct { color: var(--muted); font-size: 13px; text-align: right; white-space: nowrap; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
  .pill.Applied { background: #2b2e36; color: #aab0bb; }
  .pill.Interviewed { background: #1e3a5f; color: #7cc0ff; }
  .pill.Accepted { background: #14392a; color: #4ade80; }
  .pill.Payment { background: #3d2f14; color: #fbbf24; }
  .pill.Onboarded { background: #2a1a3f; color: #c084fc; }
  .pill.Rejected { background: #3f1a1a; color: #f87171; }
  .pill.Waitlisted { background: #33301a; color: #e0d572; }
  .side { color: var(--muted); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>
<header>
  <h1>Pitchless — Application Funnel</h1>
  <div class="meta">
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/18JeWMZA968ecOfQN2ypQPjn93Bdxz6ehRyjJXfHljco/edit?gid=0#gid=0" target="_blank" rel="noopener">Applications Sheet ↗</a>
    <span id="updated"></span>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="card">
  <h2>Funnel</h2>
  <div id="funnel"></div>
  <div class="side" id="side"></div>
</div>

<div class="card">
  <h2>Applicants</h2>
  <table>
    <thead><tr><th>Name</th><th>City</th><th>Source</th><th>Submitted</th><th>Stage</th></tr></thead>
    <tbody id="people"></tbody>
  </table>
</div>

<script>
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
fetch("data.json?t=" + Date.now()).then(r => r.json()).then(d => {
  document.getElementById("updated").textContent = "Last updated: " + d.updated;
  const max = d.funnel[0].count || 1;

  document.getElementById("stats").innerHTML = d.funnel.map(f =>
    `<div class="stat"><div class="n">${f.count}</div><div class="l">${esc(f.stage)}</div></div>`).join("");

  document.getElementById("funnel").innerHTML = d.funnel.map(f => {
    const pct = Math.round(f.count / max * 100);
    return `<div class="row"><div class="label">${esc(f.stage)}</div>
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
      <div class="pct">${f.count} · ${pct}%</div></div>`;
  }).join("");

  document.getElementById("side").textContent =
    `Rejected: ${d.side.rejected} · Waitlisted: ${d.side.waitlisted}`;

  const order = {Onboarded:0,"Payment Sent":1,Accepted:2,Interviewed:3,Applied:4,Waitlisted:5,Rejected:6};
  document.getElementById("people").innerHTML = d.people
    .sort((a,b) => (order[a.stage]??9) - (order[b.stage]??9))
    .map(p => `<tr><td>${esc(p.name)}</td><td>${esc(p.city)}</td><td>${esc(p.source)}</td>
      <td>${esc((p.submitted||"").split(" ")[0])}</td>
      <td><span class="pill ${esc(p.stage.split(" ")[0])}">${esc(p.stage)}</span></td></tr>`).join("");
});
</script>
</body>
</html>
