name: Update funnel data

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch sheet data
        run: python3 scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "funnel-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update funnel data"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
